<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG ANIMATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- cursor -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <!-- particulas -->
    <canvas id="canvas"></canvas>

    <!-- nav -->
    <nav>
        <div class="logo">re <span>.</span>launch</div>
        <ul class="nav-links">
            <li><a href="#"></a>Serviços</li>
            <li><a href="#"></a>Trabalhos</li>
            <li><a href="#"></a>Sobre</li>
            <li><a href="#"></a>Contato</li>
        </ul>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="grid-bg"></div>
        <div class="vignette"></div>
        <div class="noise"></div>

        <div class="badge">
            <span class="badge-dot"></span>
            disponível para projetos
        </div>

        <h1 class="headline">
            <span class="headline-line">
                <span class="headline-word">Criamos</span>
                <span class="headline-word">&nbsp;</span>
                <span class="headline-word accent">experiências</span>
            </span>

            <span class="headline-line">
                <span class="headline-word">digitais</span>
                <span class="headline-word">&nbsp;</span>
                <span class="headline-word">que</span>
            </span>

            <span class="headline-line">
                <span class="headline-word accent">impactam.</span>
            </span>
        </h1>

        <p class="sub">
            Design e tecnologia que transforma visitantes em clientes — interfaces que respiram intenção.
        </p>

        <div class="buttons">
            <a href="#" class="btn-primary">Ver projetos <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="#040a05" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            <a href="#" class="btn-ghost">Fale conosco</a>
        </div>

        <div class="scroll-hint">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
